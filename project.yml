name: Flashcards
options:
  bundleIdPrefix: com.mike
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"                 # Swift 6 language mode
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.9.0"
    CURRENT_PROJECT_VERSION: "23"
    GENERATE_INFOPLIST_FILE: YES

packages:
  # Native CoreText math typesetting (vector, no web view). Compiles in its own Swift 5 mode,
  # so it's unaffected by the app's Swift 6 strict-concurrency setting.
  SwiftMath:
    url: https://github.com/mgriebling/SwiftMath
    from: "1.7.3"

targets:
  Flashcards:
    type: application
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Flashcards
    dependencies:
      - package: SwiftMath
    # Real Info.plist (generated by xcodegen) so we can set UIFileSharingEnabled,
    # which isn't an allowlisted INFOPLIST_KEY_ build setting.
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Flashcards
        # Source the app version from the build settings (MARKETING_VERSION / CURRENT_PROJECT_VERSION)
        # rather than xcodegen's static 1.0/1 default, so a version bump actually reaches the app.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.education
        UILaunchScreen: {}
        # Expose the Documents/Flashcards folder (the .deck files) in the Files app on iOS.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        # Make .cards files first-class Flashcards documents: custom icon + "open with
        # Flashcards" / double-click to open. The exported UTI owns the .cards extension
        # (unlike .deck, which collides with another app's document type on some systems).
        CFBundleDocumentTypes:
          - CFBundleTypeName: Flashcards Deck
            CFBundleTypeRole: Editor
            LSHandlerRank: Owner
            LSItemContentTypes:
              - com.mike.flashcards.cards
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.mike.flashcards.cards
            UTTypeDescription: Flashcards Deck
            # Conform to public.data (not public.json/text): a deck is our own document type, so
            # macOS draws its standard document icon (badged with the app icon) rather than the
            # generic text-document preview. No custom document icon is provided.
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - cards
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mike.Flashcards
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Ad-hoc sign locally (no Team ID needed). Set at target level to override
        # xcodegen's "iPhone Developer" preset. macOS signs ad-hoc; iOS simulator
        # needs no signing. For device installs / TestFlight, set a DEVELOPMENT_TEAM
        # and switch CODE_SIGN_STYLE to Automatic.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO

  FlashcardsTests:
    type: bundle.unit-test
    supportedDestinations: [macOS]
    sources:
      - path: FlashcardsTests
    dependencies:
      - target: Flashcards
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mike.FlashcardsTests
        GENERATE_INFOPLIST_FILE: YES
        # xcodegen emits the iOS-layout TEST_HOST; tests run on macOS, so point
        # at the macOS executable inside the .app bundle.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Flashcards.app/Contents/MacOS/Flashcards"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO

schemes:
  Flashcards:
    build:
      targets:
        Flashcards: all
        FlashcardsTests: [test]
    test:
      targets: [FlashcardsTests]
